<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Para Flor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
      body { font-family: "Poppins", sans-serif; }

      .sky {
        background: radial-gradient(ellipse 70% 50% at 50% 18%, #3d2049 0%, #1e1128 55%, #120a17 100%);
      }

      /* ---- ambient hearts ---- */
      .hearts { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
      .hearts span {
        position: absolute; bottom: -10%;
        color: rgba(232, 160, 184, 0.35);
        animation: floatUp linear infinite;
      }
      @keyframes floatUp {
        0% { transform: translateY(0) scale(0.8); opacity: 0; }
        10% { opacity: 0.7; }
        85% { opacity: 0.3; }
        100% { transform: translateY(-115vh) scale(1.1); opacity: 0; }
      }

      /* ---- stage ---- */
      .stage {
        position: relative;
        width: 100%;
        max-width: 380px;
        height: 380px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ---- envelope ---- */
      .envelope {
        position: relative;
        width: clamp(250px, 70vw, 340px);
        height: clamp(170px, 46vw, 226px);
        perspective: 1200px;
        outline: none;
        cursor: pointer;
        transition: opacity .5s ease, transform .5s ease;
      }
      .envelope:focus-visible .pocket {
        box-shadow: 0 20px 45px -15px rgba(0,0,0,.6), 0 0 0 3px rgba(232,160,184,0.7);
      }

      .pocket {
        position: absolute; inset: 0;
        border-radius: 8px;
        background: linear-gradient(160deg, #b5677d 0%, #8a3f5c 60%, #762f4d 100%);
        box-shadow: 0 20px 45px -15px rgba(0,0,0,.6);
        z-index: 2;
      }
      .pocket::after {
        content: "";
        position: absolute; left: 0; right: 0; bottom: 0; height: 55%;
        background: linear-gradient(160deg, rgba(255,255,255,0.06), transparent 60%);
        clip-path: polygon(0% 100%, 50% 30%, 100% 100%);
        border-radius: 0 0 8px 8px;
      }

      .flap {
        position: absolute; top: 0; left: 0;
        width: 100%; height: 58%;
        background: linear-gradient(160deg, #c97a92 0%, #96436a 70%);
        clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
        transform-origin: top center;
        z-index: 3;
        transition: transform .8s ease-in-out, z-index 0s .35s;
      }

      .seal {
        position: absolute; left: 50%; top: 53%;
        width: 52px; height: 52px;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        background: radial-gradient(circle at 32% 28%, #f0cf9a, #caa06a 55%, #93683c 100%);
        box-shadow: 0 6px 14px rgba(0,0,0,.4), inset 0 -3px 6px rgba(0,0,0,.35);
        display: flex; align-items: center; justify-content: center;
        font-family: "Caveat", cursive; font-weight: 700; font-size: 26px;
        color: #5c3a1e;
        z-index: 4;
        transition: opacity .5s ease, transform .5s ease;
      }

      /* ---- color papers coming out of the envelope ---- */
      .papers {
        position: absolute;
        left: 50%; top: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        gap: 16px;
        z-index: 6;
        pointer-events: none;
      }
      .paper {
        pointer-events: none;
        width: 74px; height: 92px;
        border: none;
        border-radius: 4px 4px 4px 10px;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 4px;
        font-size: 22px;
        opacity: 0;
        transform: translateY(40px) rotate(0deg) scale(.7);
        transition: opacity .45s ease, transform .55s cubic-bezier(.34,1.56,.64,1);
        box-shadow: 0 10px 22px rgba(0,0,0,.4);
        cursor: pointer;
        position: relative;
      }
      .paper::after {
        content: "";
        position: absolute; top: 0; right: 0;
        width: 0; height: 0;
        border-style: solid;
        border-width: 0 12px 12px 0;
        border-color: transparent rgba(0,0,0,0.14) transparent transparent;
        border-radius: 0 4px 0 0;
      }
      .paper-rosa { background: #f3a8c4; }
      .paper-celeste { background: #9ed7ee; }
      .paper-amarillo { background: #f3dd8a; }
      .paper .paper-label {
        font-family: "Poppins", sans-serif;
        font-size: 9px; font-weight: 600; letter-spacing: .03em;
        color: rgba(0,0,0,.55);
      }

      /* ---- note card ---- */
      .note-card {
        position: absolute;
        left: 50%; top: 50%;
        transform: translate(-50%, -50%) scale(.85);
        width: clamp(240px, 80vw, 320px);
        border-radius: 10px;
        padding: 1.6rem 1.3rem 1.2rem;
        box-shadow: 0 18px 36px rgba(0,0,0,.45);
        display: flex; flex-direction: column; align-items: center; gap: .5rem;
        text-align: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity .45s ease, transform .5s cubic-bezier(.22,1,.36,1);
        z-index: 7;
      }
      .note-card.pink   { background: #fbe1ea; }
      .note-card.blue   { background: #e1f1f8; }
      .note-card.yellow { background: #fbf1d2; }

      .note-category {
        font-family: "Poppins", sans-serif;
        font-size: 11px; text-transform: uppercase; letter-spacing: .18em; font-weight: 600;
        opacity: .65;
      }
      .note-card.pink .note-category   { color: #7a2350; }
      .note-card.blue .note-category   { color: #235a73; }
      .note-card.yellow .note-category { color: #7a5b1e; }

      .note-text {
        font-family: "Caveat", cursive; font-weight: 700;
        font-size: clamp(1.35rem, 6vw, 1.75rem); line-height: 1.25;
      }
      .note-card.pink .note-text   { color: #6b1e46; }
      .note-card.blue .note-text   { color: #1e4c63; }
      .note-card.yellow .note-text { color: #6b4d16; }

      .note-signature { font-family: "Caveat", cursive; font-size: 1rem; opacity: .7; margin-top: .1rem; }

      .choose-again {
        margin-top: .5rem;
        font-family: "Poppins", sans-serif; font-size: 11px; letter-spacing: .04em;
        background: rgba(0,0,0,0.08); border: none; border-radius: 999px;
        padding: 7px 16px; cursor: pointer; color: inherit; opacity: .8;
      }
      .choose-again:hover { opacity: 1; }

      /* ---- state machine ---- */
      /* closed: envelope shut */
      .wrap[data-state="choosing"] .flap,
      .wrap[data-state="reading"] .flap { transform: rotateX(-180deg); z-index: 0; }
      .wrap[data-state="choosing"] .seal,
      .wrap[data-state="reading"] .seal {
        opacity: 0; transform: translate(-50%, -50%) scale(1.7) rotate(18deg); pointer-events: none;
      }

      /* choosing: envelope fades back, papers pop out */
      .wrap[data-state="choosing"] .envelope,
      .wrap[data-state="reading"] .envelope {
        opacity: .18; pointer-events: none; transform: scale(.94);
      }
      .wrap[data-state="choosing"] .papers .paper {
        opacity: 1; pointer-events: auto;
      }
      .wrap[data-state="choosing"] .papers .paper:nth-child(1) {
        transform: translateY(-6px) rotate(-9deg) scale(1); transition-delay: .1s;
      }
      .wrap[data-state="choosing"] .papers .paper:nth-child(2) {
        transform: translateY(-14px) rotate(0deg) scale(1.05); transition-delay: .2s;
      }
      .wrap[data-state="choosing"] .papers .paper:nth-child(3) {
        transform: translateY(-6px) rotate(9deg) scale(1); transition-delay: .3s;
      }

      /* reading: note visible, papers gone */
      .wrap[data-state="reading"] .papers .paper { opacity: 0; pointer-events: none; }
      .wrap[data-state="reading"] .note-card {
        opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto;
      }

      .hint { transition: opacity .35s ease; min-height: 1.4em; }

      @media (prefers-reduced-motion: reduce) {
        .hearts span { animation: none; display: none; }
        .flap, .seal, .paper, .note-card, .envelope { transition: none !important; }
      }
    </style>
  </head>
  <body class="sky min-h-screen w-full flex items-center justify-center overflow-hidden relative">

    <div class="hearts" aria-hidden="true">
      <span style="left: 6%; font-size: 14px; animation-duration: 11s; animation-delay: 0s;">♥</span>
      <span style="left: 16%; font-size: 10px; animation-duration: 9s; animation-delay: 2s;">♥</span>
      <span style="left: 28%; font-size: 16px; animation-duration: 13s; animation-delay: 1s;">♥</span>
      <span style="left: 41%; font-size: 11px; animation-duration: 8s; animation-delay: 4s;">♥</span>
      <span style="left: 55%; font-size: 15px; animation-duration: 12s; animation-delay: 0.5s;">♥</span>
      <span style="left: 67%; font-size: 12px; animation-duration: 10s; animation-delay: 3s;">♥</span>
      <span style="left: 78%; font-size: 18px; animation-duration: 14s; animation-delay: 1.5s;">♥</span>
      <span style="left: 88%; font-size: 11px; animation-duration: 9s; animation-delay: 2.5s;">♥</span>
      <span style="left: 35%; font-size: 13px; animation-duration: 11s; animation-delay: 5s;">♥</span>
      <span style="left: 95%; font-size: 14px; animation-duration: 10s; animation-delay: 0.8s;">♥</span>
    </div>

    <div id="wrap" class="wrap relative z-10 flex flex-col items-center gap-6 px-6" data-state="closed">

      <p class="uppercase tracking-[0.3em] text-[10.5px] sm:text-xs text-rose-200/70">para flor</p>

      <div class="stage">

        <div id="envelope" class="envelope select-none" role="button" tabindex="0" aria-label="Abrir la carta">
          <div class="pocket"></div>
          <div class="flap"></div>
          <div class="seal"><span>F</span></div>
        </div>

        <div class="papers">
          <button class="paper paper-rosa" data-color="rosa" aria-label="Papel rosa: una canción">
            <span>🎵</span><span class="paper-label">una canción</span>
          </button>
          <button class="paper paper-celeste" data-color="celeste" aria-label="Papel celeste: aún te amo porque">
            <span>💙</span><span class="paper-label">aún te amo</span>
          </button>
          <button class="paper paper-amarillo" data-color="amarillo" aria-label="Papel amarillo: un momento">
            <span>⭐</span><span class="paper-label">un momento</span>
          </button>
        </div>

        <div id="noteCard" class="note-card">
          <p id="noteCategory" class="note-category"></p>
          <p id="noteText" class="note-text"></p>
          <p class="note-signature">— Gino</p>
          <button id="chooseAgain" class="choose-again">elegir otro papel</button>
        </div>

      </div>

      <p id="hint" class="text-rose-200/70 text-[11px] tracking-wide">tocá la carta</p>
    </div>

    <script>
      const wrap = document.getElementById("wrap");
      const envelope = document.getElementById("envelope");
      const papers = document.querySelectorAll(".paper");
      const noteCard = document.getElementById("noteCard");
      const noteCategory = document.getElementById("noteCategory");
      const noteText = document.getElementById("noteText");
      const chooseAgainBtn = document.getElementById("chooseAgain");
      const hint = document.getElementById("hint");

      // Frases editables por color. Sumá, sacá o cambiá las que quieras.
      const frases = {
        rosa: [
          "Always de rufus",
          "In the moment",
          "best of me",
          "make me de anyma",
          "lady in red, quiero bailarla con vos",
          "sweet disposition",
        ],
        celeste: [
          "te amo porque me hacés reír hasta en los peores días",
          "te amo porque sos mi lugar seguro",
          "te amo porque cada día elijo estar con vos de nuevo",
          "te amo porque sos la mejor persona que conozco",
          "te amo porque nunca dejaste de sorprenderme",
          "te amo porque caminas como enana, jajaja",
           "te amo por bailar conmigo",
        ],
        amarillo: [
          "cuando se me cayeron las hamburguesas",
          "cuando nos quedamos en la terraza viendo pelis",
          "cuando bailamos abajo",
          "cundo me haces naaaaaaw",
          "cuando nos quedamos hablando hasta tarde, te amo",
        ],
      };

      const labels = {
        rosa: "una canción",
        celeste: "te amo porque",
        amarillo: "un momento nuestro",
      };

      const claseColor = { rosa: "pink", celeste: "blue", amarillo: "yellow" };
      const lastByColor = { rosa: -1, celeste: -1, amarillo: -1 };

      function elegirFrase(color) {
        const lista = frases[color];
        if (lista.length === 1) return lista[0];
        let i;
        do {
          i = Math.floor(Math.random() * lista.length);
        } while (i === lastByColor[color]);
        lastByColor[color] = i;
        return lista[i];
      }

      function setHint(estado) {
        if (estado === "closed") hint.textContent = "tocá la carta";
        else if (estado === "choosing") hint.textContent = "elegí un papelito";
        else hint.textContent = "";
      }

      function mostrarNota(color) {
        noteCard.classList.remove("pink", "blue", "yellow");
        noteCard.classList.add(claseColor[color]);
        noteCategory.textContent = labels[color];
        noteText.textContent = elegirFrase(color);
        wrap.dataset.state = "reading";
        setHint("reading");
      }

      function abrirCarta() {
        if (wrap.dataset.state === "closed") {
          wrap.dataset.state = "choosing";
        } else {
          wrap.dataset.state = "closed";
        }
        setHint(wrap.dataset.state);
      }

      envelope.addEventListener("click", abrirCarta);
      envelope.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          abrirCarta();
        }
      });

      papers.forEach((paper) => {
        paper.addEventListener("click", (e) => {
          e.stopPropagation();
          mostrarNota(paper.dataset.color);
        });
      });

      chooseAgainBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        wrap.dataset.state = "choosing";
        setHint("choosing");
      });
    </script>
  </body>
</html>
